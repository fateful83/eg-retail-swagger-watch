name: EG Retail Swagger Watch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: eg-retail-swagger-watch
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore previous snapshot state
        run: |
          git fetch origin snapshot-state:snapshot-state || true
          mkdir -p .swagger_watch_state
          if git show-ref --verify --quiet refs/heads/snapshot-state; then
            git checkout snapshot-state -- .swagger_watch_state || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run watcher
        env:
          DIRECT_SPECS_JSON: ${{ secrets.DIRECT_SPECS_JSON }}
          AUTH_HEADER: ${{ secrets.AUTH_HEADER }}
          EXTRA_HEADERS_JSON: ${{ secrets.EXTRA_HEADERS_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REQUEST_TIMEOUT_SECONDS: '30'
          POLL_CRON: '0 */6 * * *'
          RETENTION_DAYS: '180'
        run: |
          python eg_retail_swagger_watch_agent.py

      - name: Run history page generator
        run: |
          python eg_retail_swagger_history_page.py

      - name: Save updated snapshot state to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch snapshot-state || git checkout -b snapshot-state
          mkdir -p .swagger_watch_state
          git add .swagger_watch_state

          if git diff --cached --quiet; then
            echo "No snapshot state changes to commit"
          else
            git commit -m "Update snapshot state"
            git push origin snapshot-state
          fi

          git switch main

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp .swagger_watch_state/dashboard.html site/index.html
          cp .swagger_watch_state/history.html site/history.html
          cp .swagger_watch_state/history_index.json site/history_index.json

          if [ -d .swagger_watch_state/history_reports ]; then
            cp -r .swagger_watch_state/history_reports site/history_reports
          fi

          for dir in .swagger_watch_state/*; do
            if [ -d "$dir" ] && [ -d "$dir/snapshots" ]; then
              cp -r "$dir" "site/$(basename "$dir")"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4