name: EG Retail Swagger Watch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: eg-retail-swagger-watch
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run watcher
        env:
          DIRECT_SPECS_JSON: ${{ secrets.DIRECT_SPECS_JSON }}
          AUTH_HEADER: ${{ secrets.AUTH_HEADER }}
          EXTRA_HEADERS_JSON: ${{ secrets.EXTRA_HEADERS_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REQUEST_TIMEOUT_SECONDS: '30'
        run: |
          python eg_retail_swagger_watch_agent.py

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp .swagger_watch_state/dashboard.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4